[package]
name = "git-stack"
version = "0.1.0"
edition = "2024"
description = "Git-native stacked branch workflow helper"
readme = "README.md"
license-file = "LICENSE"
homepage = "https://larakelley.com/git-stack"
repository = "https://github.com/lararosekelley/git-stack"
rust-version = "1.95.0"
keywords = ["git", "stacked-diffs", "cli", "github", "gitlab"]
categories = ["command-line-utilities", "development-tools"]
exclude = [
    ".github/**",
    ".husky/**",
    "node_modules/**",
    "target/**",
    "chat.md",
    "commitlint.config.cjs",
    "package-lock.json",
    "package.json",
]

[dependencies]
anyhow = "1.0.100"
clap = { version = "4.5.53", features = ["derive"] }
serde_json = "1.0.150"

[dev-dependencies]
assert_cmd = "2.1.1"
predicates = "3.1.3"
tempfile = "3.23.0"
